<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>₿ 比特币四年周期模型</title>
<style>
  :root {
    --btc-orange: #F7931A;
    --btc-orange-dim: rgba(247, 147, 26, 0.15);
    --bg: #0a0a0f;
    --card: #12121a;
    --card-border: #1e1e2e;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --green: #22c55e;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #a855f7;
    --cyan: #06b6d4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 20px 60px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header .icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }

  header h1 span { color: var(--btc-orange); }

  header p {
    color: var(--text-dim);
    font-size: 15px;
  }

  /* Info Cards Row */
  .info-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }

  .info-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
  }

  .info-card .label {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .info-card .value {
    font-size: 24px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .info-card .sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .info-card .value.orange { color: var(--btc-orange); }

  /* Countdown */
  .countdown-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 8px;
  }

  .countdown-unit {
    text-align: center;
  }

  .countdown-unit .num {
    font-size: 28px;
    font-weight: 700;
    color: var(--btc-orange);
    font-variant-numeric: tabular-nums;
  }

  .countdown-unit .unit {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* Current Phase Card */
  .phase-current {
    background: var(--card);
    border: 1px solid var(--btc-orange);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 36px;
    position: relative;
    overflow: hidden;
  }

  .phase-current::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--btc-orange);
  }

  .phase-current .badge {
    display: inline-block;
    background: var(--btc-orange-dim);
    color: var(--btc-orange);
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
  }

  .phase-current h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .phase-current .desc {
    color: var(--text-dim);
    font-size: 15px;
    margin-bottom: 16px;
  }

  .progress-bar {
    background: #1e1e2e;
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .progress-bar .fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--btc-orange), #fbbf24);
    transition: width 0.8s ease;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: var(--text-dim);
  }

  /* Timeline */
  .timeline-title {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
  }

  .timeline {
    position: relative;
    padding-left: 28px;
  }

  .timeline::before {
    content: '';
    position: absolute;
    left: 8px;
    top: 4px;
    bottom: 4px;
    width: 2px;
    background: var(--card-border);
  }

  .phase-item {
    position: relative;
    margin-bottom: 4px;
    padding: 16px 20px;
    border-radius: 12px;
    background: transparent;
    transition: background 0.2s;
  }

  .phase-item::before {
    content: '';
    position: absolute;
    left: -20px;
    top: 22px;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--card-border);
    border: 2px solid var(--bg);
    z-index: 1;
  }

  .phase-item.active {
    background: var(--btc-orange-dim);
  }

  .phase-item.active::before {
    background: var(--btc-orange);
    box-shadow: 0 0 8px rgba(247, 147, 26, 0.5);
  }

  .phase-item.past::before {
    background: var(--text-dim);
  }

  .phase-item .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }

  .phase-item .phase-range {
    font-size: 13px;
    font-weight: 600;
    color: var(--btc-orange);
    white-space: nowrap;
  }

  .phase-item .phase-name {
    font-size: 15px;
    font-weight: 600;
  }

  .phase-item .phase-desc {
    font-size: 14px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .phase-item .phase-dates {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 6px;
    opacity: 0.7;
  }

  /* Footer */
  footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--card-border);
    color: var(--text-dim);
    font-size: 13px;
  }

  footer a { color: var(--btc-orange); text-decoration: none; }

  /* Responsive */
  @media (max-width: 640px) {
    .container { padding: 24px 16px 40px; }
    .info-row { grid-template-columns: 1fr; gap: 12px; }
    .info-card .value { font-size: 20px; }
    .countdown-unit .num { font-size: 22px; }
    header h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="icon">₿</div>
    <h1><span>比特币</span>四年周期模型</h1>
    <p>减半 T0 模型 · 基于历史 48 个月完整周期理论</p>
  </header>

  <!-- Info Cards -->
  <div class="info-row">
    <div class="info-card">
      <div class="label">上次减半</div>
      <div class="value">2024.04.20</div>
      <div class="sub">区块 #840,000</div>
    </div>
    <div class="info-card">
      <div class="label">预计下次减半</div>
      <div class="value orange" id="nextHalving">—</div>
      <div class="sub">区块 #1,050,000</div>
    </div>
    <div class="info-card">
      <div class="label">距下次减半</div>
      <div class="countdown-row" id="countdown">
        <div class="countdown-unit"><div class="num" id="cd-days">—</div><div class="unit">天</div></div>
        <div class="countdown-unit"><div class="num" id="cd-hours">—</div><div class="unit">时</div></div>
        <div class="countdown-unit"><div class="num" id="cd-min">—</div><div class="unit">分</div></div>
        <div class="countdown-unit"><div class="num" id="cd-sec">—</div><div class="unit">秒</div></div>
      </div>
    </div>
  </div>

  <!-- Current Phase -->
  <div class="phase-current">
    <div class="badge" id="phaseMonth">T+—</div>
    <h2 id="phaseName">—</h2>
    <div class="desc" id="phaseDesc">—</div>
    <div class="progress-bar"><div class="fill" id="phaseFill" style="width:0%"></div></div>
    <div class="progress-label">
      <span id="phaseStart">—</span>
      <span id="phaseProgress">—</span>
      <span id="phaseEnd">—</span>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline-title">📅 完整周期阶段</div>
  <div class="timeline" id="timeline"></div>

  <footer>
    数据基于历史周期统计规律，不构成投资建议 · <a href="https://github.com/xwzp" target="_blank">@xwzp</a>
  </footer>
</div>

<script>
// === Config ===
const LAST_HALVING = new Date('2024-04-20T00:00:00Z');
const NEXT_HALVING_EST = new Date('2028-04-17T00:00:00Z'); // ~210,000 blocks later

const PHASES = [
  { start: 0,  end: 12, name: '震荡阶段',     color: '#3b82f6', desc: '市场消化供给变化，后期趋势上升启动' },
  { start: 12, end: 18, name: '主升浪 + 见顶', color: '#22c55e', desc: '最容易出现主升浪与见顶，见顶时间平均 T+16' },
  { start: 18, end: 24, name: '高位转弱期',    color: '#f59e0b', desc: '趋势逐步转弱，历史上是转向熊市的转弯阶段' },
  { start: 24, end: 30, name: '熊底窗口',      color: '#ef4444', desc: '历史熊底窗口，统计均值 T+28' },
  { start: 30, end: 48, name: '修复期',        color: '#a855f7', desc: '缓慢修复，准备进入下一轮减半周期' },
];

// === Helpers ===
function monthsSince(from, to) {
  const ms = to - from;
  return ms / (1000 * 60 * 60 * 24 * 30.44);
}

function addMonths(date, months) {
  const d = new Date(date);
  d.setMonth(d.getMonth() + months);
  return d;
}

function fmt(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}`;
}

function fmtFull(d) {
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

// === Countdown ===
function updateCountdown() {
  const now = new Date();
  let diff = NEXT_HALVING_EST - now;
  if (diff < 0) diff = 0;

  const days  = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins  = Math.floor((diff % 3600000) / 60000);
  const secs  = Math.floor((diff % 60000) / 1000);

  document.getElementById('cd-days').textContent = days;
  document.getElementById('cd-hours').textContent = String(hours).padStart(2, '0');
  document.getElementById('cd-min').textContent   = String(mins).padStart(2, '0');
  document.getElementById('cd-sec').textContent   = String(secs).padStart(2, '0');
}

// === Render ===
function render() {
  const now = new Date();
  const elapsed = monthsSince(LAST_HALVING, now);
  const monthInt = Math.floor(elapsed);

  // Next halving
  document.getElementById('nextHalving').textContent = `~${fmtFull(NEXT_HALVING_EST)}`;

  // Find current phase
  let currentPhase = PHASES[PHASES.length - 1];
  for (const p of PHASES) {
    if (elapsed >= p.start && elapsed < p.end) {
      currentPhase = p;
      break;
    }
  }

  // Phase card
  document.getElementById('phaseMonth').textContent = `当前 T+${monthInt} 个月`;
  document.getElementById('phaseName').textContent = currentPhase.name;
  document.getElementById('phaseDesc').textContent = currentPhase.desc;

  const phaseProgress = ((elapsed - currentPhase.start) / (currentPhase.end - currentPhase.start)) * 100;
  document.getElementById('phaseFill').style.width = Math.min(phaseProgress, 100) + '%';
  document.getElementById('phaseStart').textContent = `T+${currentPhase.start}`;
  document.getElementById('phaseProgress').textContent = `${Math.round(phaseProgress)}%`;
  document.getElementById('phaseEnd').textContent = `T+${currentPhase.end}`;

  // Timeline
  const timeline = document.getElementById('timeline');
  timeline.innerHTML = '';

  PHASES.forEach(p => {
    const isActive  = (elapsed >= p.start && elapsed < p.end);
    const isPast    = (elapsed >= p.end);

    const dateStart = addMonths(LAST_HALVING, p.start);
    const dateEnd   = addMonths(LAST_HALVING, p.end);

    const item = document.createElement('div');
    item.className = 'phase-item' + (isActive ? ' active' : '') + (isPast ? ' past' : '');
    item.innerHTML = `
      <div class="phase-header">
        <span class="phase-range">T+${p.start} ~ T+${p.end}</span>
        <span class="phase-name">${p.name}</span>
      </div>
      <div class="phase-desc">${p.desc}</div>
      <div class="phase-dates">${fmt(dateStart)} — ${fmt(dateEnd)}</div>
    `;
    timeline.appendChild(item);
  });

  updateCountdown();
}

// === Init ===
render();
setInterval(updateCountdown, 1000);
</script>
</body>
</html>
